name: Release
on: 
  push:
    branches: 
      - main
      - devnet-*
  workflow_dispatch:
    inputs:
      ref:
        description: 'The reference (branch/tag/commit) to build'
        required: false

jobs:
  docker-release:
    name: Release docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - name: Install cross
        if: runner.os == 'Linux'
        # cross don't publish tags, so using commit hash instead
        run: cargo install cross --git https://github.com/cross-rs/cross --rev 7b24b6e9f6834a3ac31d3dad1e2ff24c1b66f7cf

      - name: Build (cross-compile only, no docker push)
        env:
          LEAN_REPO_ROOT: ${{ github.workspace }}
        run: |
          make -C lean_client x86_64-unknown-linux-gnu
